// ─── RING CHART ──────────────────────────────────────────────────────
function Ring({ value, max, color = C.mint, size = 96, stroke = 9, label, sublabel, bg = "#EEF2F7" }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(value / (max || 1), 1);
  const offset = circ * (1 - pct);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
      <div style={{ position: "relative", width: size, height: size }}>
        <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={stroke} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{ transition: "stroke-dashoffset 0.8s cubic-bezier(0.16, 1, 0.3, 1)" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontFamily: "var(--font-display)", fontSize: size > 90 ? 20 : 15, fontWeight: 700, color: C.text, lineHeight: 1 }}>{value}</span>
          {sublabel && <span style={{ fontSize: 9, color: C.textMuted, marginTop: 2, fontWeight: 500 }}>{sublabel}</span>}
        </div>
      </div>
      {label && <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: C.textMuted }}>{label}</span>}
    </div>
  );
}

// ─── PROGRESS BAR ────────────────────────────────────────────────────
function ProgressBar({ value, max = 100, color = C.mint, height = 6, animated = true }) {
  const pct = Math.min((value / (max || 1)) * 100, 100);
  return (
    <div style={{ background: C.bg2, borderRadius: 20, height, overflow: "hidden" }}>
      <div style={{
        width: pct + "%", height: "100%", borderRadius: 20,
        background: `linear-gradient(90deg, ${color}cc, ${color})`,
        transition: animated ? "width 0.7s cubic-bezier(0.16, 1, 0.3, 1)" : "none",
      }} />
    </div>
  );
}

      border: "1px solid rgba(255,255,255,0.1)",
    }}>{msg}</div>
  ) : null;
}

// ─── PERSISTENT STORE ────────────────────────────────────────────────
function useStore(key, init) {
  const [val, setVal] = useState(() => {
    try {
      const s = localStorage.getItem("sw2_" + key);
      return s ? JSON.parse(s) : init;
    } catch { return init; }
  });
  const save = useCallback(v => {
    const next = typeof v === "function" ? v(val) : v;
    setVal(next);
    try { localStorage.setItem("sw2_" + key, JSON.stringify(next)); } catch {}
  }, [key, val]);
  return [val, save];
}

        <div style={{ position: "absolute", top: -40, right: -40, width: 240, height: 240, borderRadius: "50%", background: "radial-gradient(circle, rgba(52,201,139,0.15), transparent 70%)" }} />
        <div style={{ position: "absolute", bottom: -60, left: 60, width: 180, height: 180, borderRadius: "50%", background: "radial-gradient(circle, rgba(56,189,248,0.1), transparent 70%)" }} />
        <SectionLabel color={C.mint}>Strength & Wellness</SectionLabel>
        <div style={{ fontFamily: "var(--font-display)", fontSize: "clamp(26px, 5vw, 36px)", fontWeight: 700, color: "#fff", lineHeight: 1.2, marginBottom: 10 }}>
          Your Personal<br /><em style={{ color: C.mint }}>Training Program</em>
        </div>
        <p style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", maxWidth: 380, lineHeight: 1.65, marginBottom: 20 }}>
          A science-backed 2-day strength split tailored for PCOS management, posture correction, and sustainable fat loss.
        </p>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <Chip color={C.mint} bg="rgba(52,201,139,0.2)">2 Days / Week</Chip>
          <Chip color={C.sky} bg="rgba(56,189,248,0.2)">45–55 Min Sessions</Chip>
          <Chip color={C.peach} bg="rgba(251,113,133,0.2)">PCOS Optimized</Chip>
        </div>
      </div>

      {/* Pillars */}
      <SectionLabel color={C.textMuted}>Program Pillars</SectionLabel>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10, marginBottom: 20 }}>
        {pillars.map((p, i) => (
          <div key={i} style={{ background: p.bg, borderRadius: 18, padding: 16 }}>
            <span style={{ fontSize: 26, display: "block", marginBottom: 8 }}>{p.icon}</span>
            <div style={{ fontWeight: 700, fontSize: 13, color: p.color, marginBottom: 4 }}>{p.label}</div>
            <div style={{ fontSize: 11.5, color: C.textSub, lineHeight: 1.55 }}>{p.desc}</div>
          </div>
        ))}
      </div>

      {/* Days */}
      <SectionLabel color={C.textMuted}>Training Days</SectionLabel>
      <p style={{ fontSize: 12.5, color: C.textMuted, marginBottom: 14 }}>Tap any exercise to see full instructions, benefits, and video tutorials.</p>
      <DayCard day="A" onSelectEx={setPanelId} />
      <DayCard day="B" onSelectEx={setPanelId} />

      {/* Phases */}
      <SectionLabel color={C.textMuted} style={{ marginTop: 8 }}>Program Phases</SectionLabel>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 16 }}>
        {phases.map((p, i) => (
          <div key={i} style={{ background: C.white, borderRadius: 18, padding: 16, boxShadow: "var(--shadow-sm)", borderTop: `3px solid ${p.color}` }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: p.color, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 4 }}>{p.phase}</div>
            <div style={{ fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 700, marginBottom: 2 }}>{p.weeks}</div>
            <div style={{ fontSize: 11, color: p.color, fontWeight: 600, marginBottom: 8 }}>{p.freq}</div>
            <div style={{ fontSize: 11, color: C.textSub, lineHeight: 1.5 }}>{p.desc}</div>
          </div>
        ))}
      </div>

      {/* Overload Rule */}
      <div style={{ background: C.amberLight, borderRadius: 18, padding: 18, borderLeft: `4px solid ${C.amber}` }}>
        <div style={{ fontWeight: 700, fontSize: 13.5, marginBottom: 6 }}>📏 Progressive Overload Rule</div>
        <p style={{ fontSize: 13, color: C.textSub, lineHeight: 1.65 }}>
          When you complete <strong>all sets at the top of the rep range</strong> with solid form — add <strong>5 lbs on lower body</strong> and <strong>2.5 lbs on upper body</strong>.
        </p>
      </div>

      {panelId && <ExercisePanel exId={panelId} onClose={() => setPanelId(null)} />}
    </div>
  );
}

// ─── PLACEHOLDER PAGES (Chunks 2 & 3) ───────────────────────────────
// ─── TRACKER PAGE ────────────────────────────────────────────────────
function TrackerPage({ showToast }) {
  const [workouts, setWorkouts] = useStore("workouts", []);
  const [measurements, setMeasurements] = useStore("measurements", []);
  const [day, setDay] = useState("A");
  const [logDate, setLogDate] = useState(todayStr());
  const [duration, setDuration] = useState("50");
  const [notes, setNotes] = useState("");
  const [setSets, setSetSets] = useState({});
  const [activityLevel, setActivityLevel] = useState("1.55");
  const [goalType, setGoalType] = useState("-300");
  const [showMeasForm, setShowMeasForm] = useState(false);
  const [showTDEE, setShowTDEE] = useState(false);
  const [mForm, setMForm] = useState({ weight: "", height: "", age: "", bf: "", waist: "", hips: "", bust: "", thigh: "" });
  const [activeSection, setActiveSection] = useState("log"); // "log" | "history" | "body"

  const latest = measurements[measurements.length - 1];
  const prev = measurements[measurements.length - 2];
  const exes = EXERCISES[day];
  const sorted = [...workouts].sort((a, b) => new Date(b.date) - new Date(a.date));

  const initSets = useCallback(() => {
    const s = {};
    exes.forEach((ex, i) => { s[i] = [{ reps: "", weight: "" }, { reps: "", weight: "" }, { reps: "", weight: "" }]; });
    setSetSets(s);
  }, [day]);
  useEffect(() => { initSets(); }, [initSets]);

  const updateSet = (ei, si, field, val) => setSetSets(p => ({ ...p, [ei]: p[ei].map((s, j) => j === si ? { ...s, [field]: val } : s) }));
  const addSet = ei => setSetSets(p => ({ ...p, [ei]: [...(p[ei] || []), { reps: "", weight: "" }] }));
  const removeSet = (ei, si) => setSetSets(p => ({ ...p, [ei]: p[ei].filter((_, j) => j !== si) }));

  const calcTDEE = () => {
    if (!latest?.weight || !latest?.age) return null;
    let hCm = 162;
    if (latest.height) {
      const m = latest.height.toString().match(/(\d+)['\s]*(\d*)/);
      if (m) hCm = parseInt(m[1]) * 30.48 + (parseInt(m[2]) || 0) * 2.54;
    }
    const kg = latest.weight * 0.453592;
    const bmr = 10 * kg + 6.25 * hCm - 5 * latest.age - 161;
    const tdeeVal = Math.round(bmr * parseFloat(activityLevel));
    const target = tdeeVal + parseInt(goalType);
    const protein = Math.round(latest.weight * 0.85);
    const fat = Math.round(target * 0.27 / 9);
    const carbs = Math.round((target - protein * 4 - fat * 9) / 4);
    return { bmr: Math.round(bmr), tdee: tdeeVal, target, protein, carbs, fat };
  };
  const tdee = calcTDEE();

  const saveMeasurements = () => {
    const entry = { date: todayStr(), ...Object.fromEntries(Object.entries(mForm).map(([k, v]) => [k, v ? parseFloat(v) || v : null])) };
    setMeasurements(p => [...p, entry]);
    try { localStorage.setItem("sw2_calorieTargets", JSON.stringify(tdee || {})); } catch {}
    setShowMeasForm(false);
    showToast("✅ Measurements saved!");
  };

  const saveWorkout = () => {
    const exerciseData = exes.map((ex, ei) => ({
      name: ex.name,
      sets: (setSets[ei] || []).filter(s => s.reps).map(s => ({ reps: parseInt(s.reps), weight: parseFloat(s.weight) || 0 }))
    })).filter(e => e.sets.length > 0);
    if (!exerciseData.length) { showToast("⚠️ Log at least one set first"); return; }
    setWorkouts(p => [...p, { id: Date.now(), date: logDate, day, duration: parseInt(duration) || 50, notes, exercises: exerciseData }]);
    setNotes(""); initSets();
    showToast("✅ Workout saved!");
    setActiveSection("history");
  };

  const deleteWorkout = id => { setWorkouts(p => p.filter(w => w.id !== id)); showToast("Removed"); };

  const measFields = [
    { k: "weight", l: "Weight (lbs)", step: "0.1" },
    { k: "height", l: "Height (e.g. 5'5\")", type: "text" },
    { k: "age",    l: "Age", step: "1" },
    { k: "bf",     l: "Body Fat %", step: "0.1" },
    { k: "waist",  l: "Waist (in)", step: "0.1" },
    { k: "hips",   l: "Hips (in)", step: "0.1" },
    { k: "bust",   l: "Bust (in)", step: "0.1" },
    { k: "thigh",  l: "Thigh (in)", step: "0.1" },
  ];

  const statFields = [
    { k: "weight", l: "Weight", u: "lbs" }, { k: "waist", l: "Waist", u: "in" },
    { k: "hips",   l: "Hips",   u: "in" }, { k: "bust",  l: "Bust",  u: "in" },
    { k: "thigh",  l: "Thigh",  u: "in" }, { k: "bf",    l: "Body Fat", u: "%" },
  ];

  const dayColors = {
    A: { accent: C.mint, light: C.mintLight, dark: C.mintDark, label: "Lower Body Drive" },
    B: { accent: C.coral, light: C.coralLight, dark: C.coralDark, label: "Hip & Pull Focus" },
  };

  // ── Section Switcher ──
  const sections = [
    { id: "log",     label: "Log Workout", icon: "🏋️" },
    { id: "body",    label: "Body Profile", icon: "📏" },
    { id: "history", label: "History", icon: "📋" },
  ];

  return (
    <div>
      {/* Section tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, background: C.bg2, borderRadius: 16, padding: 5 }}>
        {sections.map(s => (
          <button key={s.id} onClick={() => setActiveSection(s.id)} style={{
            flex: 1, padding: "9px 8px", borderRadius: 12, border: "none", cursor: "pointer",
            background: activeSection === s.id ? C.white : "transparent",
            color: activeSection === s.id ? C.text : C.textMuted,
            fontWeight: activeSection === s.id ? 700 : 500, fontSize: 12,
            boxShadow: activeSection === s.id ? "var(--shadow-sm)" : "none",
            transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center", gap: 5,
          }}>
            <span>{s.icon}</span><span>{s.label}</span>
          </button>
        ))}
      </div>

      {/* ── LOG WORKOUT ── */}
      {activeSection === "log" && (
        <div className="stagger">
          {/* Day + Date + Duration */}
          <Card>
            <SectionLabel color={C.coral}>Session Setup</SectionLabel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              <Input label="Date" type="date" value={logDate} onChange={e => setLogDate(e.target.value)} />
              <Input label="Duration (min)" type="number" value={duration} onChange={e => setDuration(e.target.value)} placeholder="50" />
            </div>
            {/* Day selector */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {["A", "B"].map(d => (
                <button key={d} onClick={() => setDay(d)} style={{
                  padding: "14px 16px", borderRadius: 14, border: `2px solid ${day === d ? dayColors[d].accent : C.border}`,
                  background: day === d ? dayColors[d].light : C.white,
                  cursor: "pointer", textAlign: "left", transition: "all 0.2s",
                }}>
                  <div style={{ fontWeight: 700, fontSize: 13.5, color: day === d ? dayColors[d].dark : C.text, marginBottom: 2 }}>
                    Day {d}
                  </div>
                  <div style={{ fontSize: 11, color: C.textMuted }}>{dayColors[d].label}</div>
                </button>
              ))}
            </div>
          </Card>

          {/* Exercise logger */}
          {exes.map((ex, ei) => {
            const dc = dayColors[day];
            return (
              <Card key={ex.id} style={{ padding: 0, overflow: "hidden" }}>
                {/* Exercise header */}
                <div style={{ padding: "14px 18px", background: `linear-gradient(135deg, ${dc.light}, ${dc.light}88)`, borderBottom: `1px solid ${dc.accent}22` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ fontWeight: 700, fontSize: 13.5, color: C.text, flex: 1 }}>{ex.name}</div>
                    <div style={{ display: "flex", gap: 5 }}>
                      {ex.tags.includes("pcos") && <Chip color={C.peach} bg={C.peachLight}>PCOS</Chip>}
                      {ex.tags.includes("posture") && <Chip color={C.lavender} bg={C.lavLight}>Posture</Chip>}
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>Target: {ex.sets} sets × {ex.reps}</div>
                </div>

                <div style={{ padding: "14px 18px" }}>
                  {/* Column headers */}
                  <div style={{ display: "grid", gridTemplateColumns: "32px 1fr 1fr 28px", gap: 8, marginBottom: 8, fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: C.textMuted }}>
                    <span>#</span><span>Reps</span><span>Weight (lbs)</span><span />
                  </div>

                  {/* Sets */}
                  {(setSets[ei] || []).map((s, si) => (
                    <div key={si} style={{ display: "grid", gridTemplateColumns: "32px 1fr 1fr 28px", gap: 8, marginBottom: 8, alignItems: "center" }}>
                      <div style={{
                        width: 32, height: 32, borderRadius: 10,
                        background: s.reps ? dc.accent : C.bg2,
                        color: s.reps ? "#fff" : C.textMuted,
                        fontSize: 11, fontWeight: 700,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        transition: "all 0.2s",
                      }}>S{si + 1}</div>
                      <input
                        type="number" placeholder="12" value={s.reps} min="1" max="100"
                        onChange={e => updateSet(ei, si, "reps", e.target.value)}
                        style={{ padding: "9px 12px", border: `1.5px solid ${s.reps ? dc.accent + "66" : C.border}`, borderRadius: 10, fontSize: 13.5, background: C.white, outline: "none", color: C.text, width: "100%", transition: "border-color 0.15s" }}
                      />
                      <input
                        type="number" placeholder="45" value={s.weight} min="0" step="2.5"
                        onChange={e => updateSet(ei, si, "weight", e.target.value)}
                        style={{ padding: "9px 12px", border: `1.5px solid ${s.weight ? dc.accent + "66" : C.border}`, borderRadius: 10, fontSize: 13.5, background: C.white, outline: "none", color: C.text, width: "100%", transition: "border-color 0.15s" }}
                      />
                      <button onClick={() => removeSet(ei, si)} style={{ width: 28, height: 28, borderRadius: 8, background: "#FEE2E2", border: "none", color: "#EF4444", cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                    </div>
                  ))}

                  <Btn size="xs" variant="soft" color={dc.accent} onClick={() => addSet(ei)}>+ Add Set</Btn>
                </div>
              </Card>
            );
          })}

          {/* Notes + Save */}
          <Card>
            <SectionLabel color={C.textMuted}>Session Notes</SectionLabel>
            <textarea
              value={notes}
              onChange={e => setNotes(e.target.value)}
              placeholder="Energy levels, PRs, how you felt…"
              style={{
                width: "100%", padding: "12px 14px",
                border: `1.5px solid ${C.border}`, borderRadius: 12,
                fontSize: 13.5, color: C.text, background: C.white,
                resize: "vertical", minHeight: 80, outline: "none",
                fontFamily: "var(--font-body)", marginBottom: 14, lineHeight: 1.6,
              }}
            />
            <Btn onClick={saveWorkout} color={C.mint} size="lg" style={{ width: "100%", justifyContent: "center" }}>
              💾 Save Workout
            </Btn>
          </Card>
        </div>
      )}

      {/* ── BODY PROFILE ── */}
      {activeSection === "body" && (
        <div className="stagger">
          {/* Stats grid */}
          {latest && !showMeasForm && (
            <Card>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div>
                  <SectionLabel color={C.sky}>Current Measurements</SectionLabel>
                  <div style={{ fontSize: 11, color: C.textMuted }}>Last updated {fmt(latest.date)}</div>
                </div>
                <Btn size="sm" variant="soft" color={C.sky} onClick={() => setShowMeasForm(true)}>Update</Btn>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                {statFields.filter(f => latest[f.k]).map(f => {
                  const cur = latest[f.k], p = prev?.[f.k];
                  const diff = p ? parseFloat((cur - p).toFixed(1)) : null;
                  const isGood = diff < 0 && ["weight", "waist", "hips", "thigh", "bf"].includes(f.k);
                  return (
                    <div key={f.k} style={{ background: C.bg, borderRadius: 14, padding: "14px 12px", textAlign: "center" }}>
                      <div style={{ fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 700, color: C.text, lineHeight: 1 }}>{cur}</div>
                      <div style={{ fontSize: 10, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5, margin: "4px 0" }}>{f.l} {f.u}</div>
                      {diff !== null && (
                        <div style={{ fontSize: 11, fontWeight: 600, color: isGood ? C.mintDark : diff > 0 ? C.coral : C.textMuted }}>
                          {diff > 0 ? "▲" : "▼"} {Math.abs(diff)} {f.u}
                        </div>
                      )}
                    </div>
                  );
                })}
                {latest.height && (
                  <div style={{ background: C.bg, borderRadius: 14, padding: "14px 12px", textAlign: "center" }}>
                    <div style={{ fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 700 }}>{latest.height}</div>
                    <div style={{ fontSize: 10, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5, margin: "4px 0" }}>Height</div>
                  </div>
                )}
                {latest.age && (
                  <div style={{ background: C.bg, borderRadius: 14, padding: "14px 12px", textAlign: "center" }}>
                    <div style={{ fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 700 }}>{latest.age}</div>
                    <div style={{ fontSize: 10, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5, margin: "4px 0" }}>Age</div>
                  </div>
                )}
              </div>
            </Card>
          )}

          {/* Measurement form */}
          {(!latest || showMeasForm) && (
            <Card className="anim-up">
              <SectionLabel color={C.sky}>{latest ? "Update Measurements" : "Add First Measurements"}</SectionLabel>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12, marginBottom: 16 }}>
                {measFields.map(f => (
                  <Input key={f.k} label={f.l} type={f.type || "number"} step={f.step} placeholder={f.l} value={mForm[f.k]} onChange={e => setMForm(p => ({ ...p, [f.k]: e.target.value }))} />
                ))}
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <Btn onClick={saveMeasurements} color={C.sky} style={{ flex: 1, justifyContent: "center" }}>Save Measurements</Btn>
                {latest && <Btn variant="secondary" onClick={() => setShowMeasForm(false)}>Cancel</Btn>}
              </div>
            </Card>
          )}

          {!latest && !showMeasForm && (
            <Empty icon="📏" title="No measurements yet" text="Add your body stats to track progress over time and calculate your daily calorie needs." />
          )}

          {/* TDEE Calculator */}
          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showTDEE ? 16 : 0 }}>
              <div>
                <SectionLabel color={C.amber}>Calorie Calculator</SectionLabel>
                <div style={{ fontWeight: 600, fontSize: 14 }}>Daily Energy Needs (TDEE)</div>
              </div>
              <Btn size="sm" variant="soft" color={C.amber} onClick={() => setShowTDEE(v => !v)}>
                {showTDEE ? "Hide" : "Calculate"}
              </Btn>
            </div>

            {showTDEE && (
              <div className="anim-down">
                {!latest?.weight ? (
                  <div style={{ fontSize: 13, color: C.textMuted, padding: "12px 0", textAlign: "center" }}>
                    Add your weight and age in body profile above to calculate your calorie needs.
                  </div>
                ) : (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                      <Select label="Activity Level" value={activityLevel} onChange={e => setActivityLevel(e.target.value)}>
                        <option value="1.2">Sedentary (desk job)</option>
                        <option value="1.375">Lightly Active (1–2× / week)</option>
                        <option value="1.55">Moderately Active (2–3× / week)</option>
                        <option value="1.725">Very Active (4–5× / week)</option>
                      </Select>
                      <Select label="Goal" value={goalType} onChange={e => setGoalType(e.target.value)}>
                        <option value="-500">Aggressive Cut (−500 kcal)</option>
                        <option value="-300">Fat Loss (−300 kcal)</option>
                        <option value="0">Maintain Weight</option>
                        <option value="250">Lean Gain (+250 kcal)</option>
                      </Select>
                    </div>

                    {tdee && (
                      <div style={{ background: C.amberLight, borderRadius: 16, padding: 18 }}>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, textAlign: "center", marginBottom: 14 }}>
                          {[
                            { label: "Calories", val: tdee.target, color: C.coral },
                            { label: "Protein",  val: tdee.protein + "g", color: C.mintDark },
                            { label: "Carbs",    val: tdee.carbs + "g", color: C.amber },
                            { label: "Fat",      val: tdee.fat + "g", color: C.lavender },
                          ].map(m => (
                            <div key={m.label}>
                              <div style={{ fontFamily: "var(--font-display)", fontSize: 26, fontWeight: 700, color: m.color }}>{m.val}</div>
                              <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>{m.label}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{ fontSize: 11, color: C.textSub, borderTop: `1px solid ${C.amberDark}33`, paddingTop: 10 }}>
                          BMR: <strong>{tdee.bmr} kcal</strong> · TDEE: <strong>{tdee.tdee} kcal</strong> · Target: <strong>{tdee.target} kcal</strong>
                        </div>
                        <Btn size="sm" variant="soft" color={C.amberDark} style={{ marginTop: 12 }}
                          onClick={() => { try { localStorage.setItem("sw2_calorieTargets", JSON.stringify(tdee)); } catch {} showToast("✅ Calorie targets saved to Nutrition!"); }}>
                          Save to Nutrition Tab
                        </Btn>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}
          </Card>
        </div>
      )}

      {/* ── HISTORY ── */}
      {activeSection === "history" && (
        <div className="stagger">
          {!sorted.length ? (
            <Empty icon="📋" title="No sessions logged" text="Complete your first workout above and it will appear here." />
          ) : (
            <>
              {/* Summary bar */}
              <Card style={{ padding: "14px 18px" }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, textAlign: "center" }}>
                  <div>
                    <div style={{ fontFamily: "var(--font-display)", fontSize: 28, fontWeight: 700, color: C.mint }}>{sorted.length}</div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5 }}>Sessions</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "var(--font-display)", fontSize: 28, fontWeight: 700, color: C.sky }}>
                      {sorted.reduce((s, w) => s + (w.duration || 0), 0)}
                    </div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5 }}>Total Min</div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "var(--font-display)", fontSize: 28, fontWeight: 700, color: C.coral }}>
                      {(() => {
                        let streak = 0;
                        const dates = [...new Set(sorted.map(w => w.date))].sort((a, b) => new Date(b) - new Date(a));
                        for (let i = 0; i < dates.length; i++) {
                          const d = new Date(dates[i]);
                          const expected = new Date();
                          expected.setDate(expected.getDate() - i * 2); // every ~2 days
                          if (Math.abs(d - expected) < 3 * 24 * 60 * 60 * 1000) streak++;
                          else break;
                        }
                        return streak;
                      })()}
                    </div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5 }}>Streak 🔥</div>
                  </div>
                </div>
              </Card>

              {sorted.slice(0, 15).map(w => {
                const dc = dayColors[w.day] || dayColors.A;
                return (
                  <Card key={w.id} style={{ padding: 0, overflow: "hidden", borderLeft: `4px solid ${dc.accent}` }}>
                    <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                          <Chip color={dc.accent} bg={dc.light}>Day {w.day}</Chip>
                          <span style={{ fontWeight: 600, fontSize: 14 }}>{dc.label}</span>
                        </div>
                        <div style={{ fontSize: 12, color: C.textMuted }}>
                          {fmt(w.date)} · {w.duration} min · {w.exercises.length} exercises
                        </div>
                      </div>
                      <button onClick={() => deleteWorkout(w.id)} style={{ background: "#FEE2E2", border: "none", color: "#EF4444", borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Remove</button>
                    </div>
                    <div style={{ padding: "12px 18px" }}>
                      {w.exercises.map(ex => (
                        <div key={ex.name} style={{ marginBottom: 10 }}>
                          <div style={{ fontWeight: 600, fontSize: 12.5, marginBottom: 6, color: C.text }}>{ex.name}</div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                            {ex.sets.map((s, i) => (
                              <span key={i} style={{ background: dc.light, borderRadius: 8, padding: "4px 10px", fontSize: 12, color: dc.dark, fontWeight: 500 }}>
                                S{i + 1}: {s.reps} reps{s.weight ? ` @ ${s.weight}lb` : ""}
                              </span>
                            ))}
                          </div>
                        </div>
                      ))}
                      {w.notes && (
                        <div style={{ fontSize: 12, color: C.textMuted, fontStyle: "italic", marginTop: 6, paddingTop: 8, borderTop: `1px solid ${C.border}` }}>
                          📝 {w.notes}
                        </div>
                      )}
                    </div>
                  </Card>
                );
              })}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── PAGE: NUTRITION ─────────────────────────────────────────────────
function NutritionPage({ showToast }) {
  const [foodLog, setFoodLog] = useStore("foodLog", []);
  const [date, setDate] = useState(todayStr());
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [modal, setModal] = useState(null);
  const [serving, setServing] = useState("100");
  const [meal, setMeal] = useState("lunch");

  const targets = (() => {
    try { return JSON.parse(localStorage.getItem("sw2_calorieTargets")) || {}; }
    catch { return {}; }
  })();
  const calTarget  = targets.target  || 2000;
  const protTarget = targets.protein || 150;
  const carbTarget = targets.carbs   || 200;
  const fatTarget  = targets.fat     || 67;

  const dayLog  = foodLog.filter(e => e.date === date);
  const totCal  = Math.round(dayLog.reduce((s, e) => s + e.kcal, 0));
  const totP    = Math.round(dayLog.reduce((s, e) => s + e.p, 0) * 10) / 10;
  const totC    = Math.round(dayLog.reduce((s, e) => s + e.c, 0) * 10) / 10;
  const totF    = Math.round(dayLog.reduce((s, e) => s + e.f, 0) * 10) / 10;
  const remaining = calTarget - totCal;

  const meals = ["breakfast", "lunch", "dinner", "snacks"];
  const mealMeta = {
    breakfast: { label: "Breakfast", icon: "🌅", color: C.amber },
    lunch:     { label: "Lunch",     icon: "☀️",  color: C.mint },
    dinner:    { label: "Dinner",    icon: "🌙",  color: C.lavender },
    snacks:    { label: "Snacks",    icon: "🍎",  color: C.peach },
  };

  const search = async () => {
    if (!query.trim()) return;
    setSearching(true);
    try {
      const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&action=process&json=1&page_size=12&fields=product_name,brands,nutriments`);
      const d = await res.json();
      const products = (d.products || [])
        .filter(p => p.product_name && p.nutriments?.["energy-kcal_100g"] != null)
        .slice(0, 10)
        .map(p => ({
          name: p.product_name + (p.brands ? ` (${p.brands.split(",")[0].trim()})` : ""),
          cal: Math.round(p.nutriments["energy-kcal_100g"] || 0),
          p: Math.round((p.nutriments["proteins_100g"] || 0) * 10) / 10,
          c: Math.round((p.nutriments["carbohydrates_100g"] || 0) * 10) / 10,
          f: Math.round((p.nutriments["fat_100g"] || 0) * 10) / 10,
        }));
      setResults(products.length ? products : COMMON_FOODS.filter(f => f.name.toLowerCase().includes(query.toLowerCase())));
    } catch {
      setResults(COMMON_FOODS.filter(f => f.name.toLowerCase().includes(query.toLowerCase())));
    }
    setSearching(false);
  };

  const addFood = () => {
    if (!modal) return;
    const r = parseFloat(serving) / 100;
    const entry = {
      id: Date.now(), date, meal, name: modal.name,
      grams: parseFloat(serving),
      kcal: Math.round(modal.cal * r),
      p: Math.round(modal.p * r * 10) / 10,
      c: Math.round(modal.c * r * 10) / 10,
      f: Math.round(modal.f * r * 10) / 10,
    };
    setFoodLog(prev => [...prev, entry]);
    setModal(null);
    showToast(`✅ Added to ${mealMeta[meal].label}`);
  };

  const removeFood = id => setFoodLog(prev => prev.filter(e => e.id !== id));

    { label: "Calories", val: totCal, max: calTarget, color: C.coral, unit: "kcal" },
    { label: "Protein",  val: totP,   max: protTarget, color: C.mint,  unit: "g" },
    { label: "Carbs",    val: totC,   max: carbTarget, color: C.amber, unit: "g" },

    <div>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>

        <SectionLabel color={C.mint}>Today's Nutrition</SectionLabel>
        {/* Calorie hero */}
        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontFamily: "var(--font-display)", fontSize: 48, fontWeight: 700, color: remaining >= 0 ? C.mint : C.peach, lineHeight: 1 }}>{totCal}</div>
          <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>

                <span style={{ color: C.textSub }}>{m.label}</span>
                <span style={{ color: m.color }}>{m.val}{m.unit} <span style={{ color: C.textMuted, fontWeight: 400 }}>/ {m.max}{m.unit}</span></span>
              </div>
              <ProgressBar value={m.val} max={m.max} color={m.color} height={7} />
            </div>
          ))}
        </div>
      </Card>

      {/* Search */}
      <Card>
        <SectionLabel color={C.sky}>Add Food</SectionLabel>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <input
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={e => e.key === "Enter" && search()}

        {/* Quick-add chips */}

                  <div style={{ fontSize: 11, color: C.textMuted }}>per 100g · P:{f.p}g · C:{f.c}g · F:{f.f}g</div>

                <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                  <span style={{ fontWeight: 700, color: C.coral, fontSize: 13 }}>{f.cal} kcal</span>
                  <Btn size="sm" variant="soft" color={C.mint} onClick={() => { setModal(f); setServing("100"); }}>+ Add</Btn>
                </div>
              </div>
            ))}
            <button onClick={() => setResults([])} style={{ fontSize: 12, color: C.textMuted, background: "none", border: "none", cursor: "pointer", marginTop: 8 }}>✕ Clear results</button>
          </div>
        )}
      </Card>

      {/* Food log by meal */}
      {!dayLog.length ? (
        <Empty icon="🥗" title="Nothing logged yet" text="Search for foods above to start tracking your meals." />

        meals.map(m => {

          const mm = mealMeta[m];
          const mealCals = items.reduce((s, e) => s + e.kcal, 0);
          return (
            <Card key={m} style={{ padding: 0, overflow: "hidden" }}>
              <div style={{ padding: "12px 18px", background: mm.color + "12", borderBottom: `1px solid ${mm.color}22`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>

                <span style={{ fontSize: 12, fontWeight: 600, color: mm.color }}>{mealCals} kcal</span>

              <div style={{ padding: "6px 0" }}>

                      <div style={{ fontSize: 11, color: C.textMuted }}>{e.grams}g · P:{e.p}g · C:{e.c}g · F:{e.f}g</div>

                      <button onClick={() => removeFood(e.id)} style={{ width: 28, height: 28, borderRadius: 8, background: "#FEE2E2", border: "none", color: "#EF4444", cursor: "pointer", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                    </div>

            </Card>

      {/* Add food modal */}
      {modal && (
        <div className="anim-in" onClick={e => e.target === e.currentTarget && setModal(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", backdropFilter: "blur(8px)", zIndex: 800, display: "flex", alignItems: "flex-end", justifyContent: "center", padding: 16 }}>

            <div style={{ fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 700, marginBottom: 2 }}>{modal.name}</div>
            <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 20 }}>Per 100g: {modal.cal} kcal · P:{modal.p}g · C:{modal.c}g · F:{modal.f}g</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              <Input label="Serving (g)" type="number" value={serving} min="1" max="2000" onChange={e => setServing(e.target.value)} />
              <Select label="Meal" value={meal} onChange={e => setMeal(e.target.value)}>
                {meals.map(m => <option key={m} value={m}>{mealMeta[m].icon} {mealMeta[m].label}</option>)}
              </Select>
            </div>
            {/* Live preview */}
            <div style={{ background: C.bg, borderRadius: 14, padding: 16, marginBottom: 18, display: "grid", gridTemplateColumns: "repeat(4,1fr)", textAlign: "center", gap: 8 }}>
              {[
                { label: "kcal",    val: Math.round(modal.cal * parseFloat(serving || 0) / 100),               color: C.coral },
                { label: "protein", val: (Math.round(modal.p * parseFloat(serving || 0) / 100 * 10) / 10) + "g", color: C.mintDark },
                { label: "carbs",   val: (Math.round(modal.c * parseFloat(serving || 0) / 100 * 10) / 10) + "g", color: C.amber },
                { label: "fat",     val: (Math.round(modal.f * parseFloat(serving || 0) / 100 * 10) / 10) + "g", color: C.lavender },
              ].map(m => (
                <div key={m.label}>
                  <div style={{ fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 700, color: m.color }}>{m.val}</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>{m.label}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn onClick={addFood} color={C.mint} style={{ flex: 1, justifyContent: "center" }}>Add to Log</Btn>
              <Btn variant="secondary" onClick={() => setModal(null)}>Cancel</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── PAGE: DASHBOARD ─────────────────────────────────────────────────
function DashboardPage({ showToast }) {
  const [workouts] = useStore("workouts", []);
  const [measurements] = useStore("measurements", []);
  const [foodLog] = useStore("foodLog", []);
  const [goals, setGoals] = useStore("goals", []);
  const [showGoalForm, setShowGoalForm] = useState(false);
  const [gForm, setGForm] = useState({ name: "", category: "strength", target: "", current: "", targetDate: "" });
  const canvasRef = useRef(null);

  const now = new Date();
  const weekAgo = new Date(now - 7 * 864e5);
  const thisWeek = workouts.filter(w => new Date(w.date + "T12:00") >= weekAgo);

  // Streak
  let streak = 0;
  const uniqueDates = [...new Set(workouts.map(w => w.date))].sort().reverse();
  let check = new Date(); check.setHours(0, 0, 0, 0);
  for (const d of uniqueDates) {
    const wd = new Date(d + "T12:00"); wd.setHours(0, 0, 0, 0);
    if (Math.round((check - wd) / 864e5) <= 1) { streak++; check = wd; } else break;
  }

  const recentCals = foodLog.filter(e => new Date(e.date + "T12:00") >= weekAgo);
  const avgCal = recentCals.length
    ? Math.round(recentCals.reduce((s, e) => s + e.kcal, 0) / Math.max(1, [...new Set(recentCals.map(e => e.date))].length))
    : null;
  const latest = measurements[measurements.length - 1];
  const sorted = [...workouts].sort((a, b) => new Date(b.date) - new Date(a.date));

  const targets = (() => {
    try { return JSON.parse(localStorage.getItem("sw2_calorieTargets")) || {}; } catch { return {}; }
  })();

  // Weight chart
  useEffect(() => {
    const data = measurements
      .filter(m => m.weight)
      .map(m => ({ date: new Date(m.date + "T12:00"), w: m.weight }))
      .sort((a, b) => a.date - b.date);
    const canvas = canvasRef.current;
    if (!canvas || data.length < 2) return;
    const W = canvas.offsetWidth, H = 160;
    canvas.width = W * 2; canvas.height = H * 2;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(2, 2);
    const weights = data.map(d => d.w);
    const minW = Math.min(...weights) - 3, maxW = Math.max(...weights) + 3;
    const px = i => (i / (data.length - 1)) * (W - 48) + 24;
    const py = w => H - 24 - ((w - minW) / (maxW - minW || 1)) * (H - 44);
    ctx.clearRect(0, 0, W, H);
    // Grid lines
    ctx.strokeStyle = C.bg2; ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const y = 24 + i * (H - 44) / 3;
      ctx.beginPath(); ctx.moveTo(24, y); ctx.lineTo(W - 24, y); ctx.stroke();
    }
    // Fill
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, C.mint + "33"); grad.addColorStop(1, C.mint + "00");
    ctx.beginPath(); ctx.moveTo(px(0), py(data[0].w));
    data.forEach((d, i) => ctx.lineTo(px(i), py(d.w)));
    ctx.lineTo(px(data.length - 1), H - 24); ctx.lineTo(px(0), H - 24); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
    // Line
    ctx.beginPath(); ctx.strokeStyle = C.mint; ctx.lineWidth = 2.5; ctx.lineJoin = "round";
    data.forEach((d, i) => i === 0 ? ctx.moveTo(px(i), py(d.w)) : ctx.lineTo(px(i), py(d.w)));
    ctx.stroke();
    // Points + labels
    data.forEach((d, i) => {
      ctx.beginPath(); ctx.arc(px(i), py(d.w), 4, 0, Math.PI * 2);
      ctx.fillStyle = C.mint; ctx.fill();
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = C.text; ctx.font = "bold 10px Plus Jakarta Sans"; ctx.textAlign = "center";
      ctx.fillText(d.w + "lb", px(i), py(d.w) - 10);
    });
  }, [measurements]);

  const saveGoal = () => {
    if (!gForm.name.trim()) { showToast("Enter a goal name"); return; }
    const tNum = parseFloat(gForm.target), cNum = parseFloat(gForm.current);
    let pct = 0;
    if (!isNaN(tNum) && !isNaN(cNum) && tNum > 0) {
      const lowerIsBetter = ["weight", "measurement"].includes(gForm.category);
      pct = lowerIsBetter
        ? Math.min(Math.round(Math.max(0, (parseFloat(gForm.current) - tNum) / (parseFloat(gForm.current) - tNum || 1) * 100), 0), 100)
        : Math.min(Math.round(cNum / tNum * 100), 100);
    }
    setGoals(prev => [...prev, { ...gForm, pct, id: Date.now() }]);
    setGForm({ name: "", category: "strength", target: "", current: "", targetDate: "" });
    setShowGoalForm(false);
    showToast("✅ Goal saved!");
  };

  const statCards = [
    { label: "Workouts This Week", val: thisWeek.length, icon: "🏋️", color: C.mint, sub: "sessions" },
    { label: "Day Streak",         val: streak,           icon: "🔥", color: C.coral, sub: streak > 0 ? "keep it up!" : "start today" },
    { label: "Avg Daily Cals",     val: avgCal || "—",    icon: "🥗", color: C.amber, sub: avgCal ? `of ${targets.target || 2000} goal` : "log food to see" },
    { label: "Current Weight",     val: latest?.weight ? latest.weight + " lb" : "—", icon: "⚖️", color: C.sky, sub: latest?.date ? "as of " + fmt(latest.date) : "add measurement" },
  ];

  return (
    <div className="stagger">
      {/* Stat cards */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 12, marginBottom: 8 }}>
        {statCards.map((s, i) => (
          <div key={i} style={{ background: C.white, borderRadius: 20, padding: "18px 16px", boxShadow: "var(--shadow-sm)", borderTop: `3px solid ${s.color}` }}>
            <div style={{ fontSize: 26, marginBottom: 8 }}>{s.icon}</div>
            <div style={{ fontFamily: "var(--font-display)", fontSize: 28, fontWeight: 700, color: s.color, lineHeight: 1, marginBottom: 4 }}>{s.val}</div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 2 }}>{s.label}</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Goals */}
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showGoalForm ? 16 : (goals.length ? 16 : 0) }}>
          <div>
            <SectionLabel color={C.lavender}>Goals</SectionLabel>
            <div style={{ fontWeight: 700, fontSize: 15 }}>My Fitness Goals</div>
          </div>
          <Btn size="sm" variant="soft" color={C.lavender} onClick={() => setShowGoalForm(v => !v)}>
            {showGoalForm ? "Cancel" : "+ Add Goal"}
          </Btn>
        </div>

        {showGoalForm && (
          <div className="anim-up" style={{ background: C.bg, borderRadius: 16, padding: 16, marginBottom: 16 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
              <div style={{ gridColumn: "1/-1" }}>
                <Input label="Goal Description" placeholder="e.g. Squat 100 lbs · Lose 15 lbs · Work out 3x/week" value={gForm.name} onChange={e => setGForm(p => ({ ...p, name: e.target.value }))} />
              </div>
              <Select label="Category" value={gForm.category} onChange={e => setGForm(p => ({ ...p, category: e.target.value }))}>
                <option value="strength">💪 Strength</option>
                <option value="weight">⚖️ Weight Loss</option>
                <option value="habit">📅 Habit</option>
                <option value="measurement">📏 Measurement</option>
                <option value="nutrition">🥗 Nutrition</option>
              </Select>
              <Input label="Target Date" type="date" value={gForm.targetDate} onChange={e => setGForm(p => ({ ...p, targetDate: e.target.value }))} />
              <Input label="Current Value" placeholder="e.g. 65 lbs" value={gForm.current} onChange={e => setGForm(p => ({ ...p, current: e.target.value }))} />
              <Input label="Target Value" placeholder="e.g. 100 lbs" value={gForm.target} onChange={e => setGForm(p => ({ ...p, target: e.target.value }))} />
            </div>
            <Btn onClick={saveGoal} color={C.lavender}>Save Goal</Btn>
          </div>
        )}

        {!goals.length && !showGoalForm
          ? <Empty icon="🎯" title="No goals yet" text="Add your first fitness goal to track your progress." />
          : goals.map((g, i) => (
            <div key={g.id || i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 0", borderBottom: i < goals.length - 1 ? `1px solid ${C.border}` : "none" }}>
              <span style={{ fontSize: 28, flexShrink: 0 }}>{GOAL_ICONS[g.category] || "🎯"}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13.5, marginBottom: 2 }}>{g.name}</div>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 8 }}>
                  {g.current} → {g.target}{g.targetDate ? " · By " + fmt(g.targetDate) : ""}
                </div>
                <ProgressBar value={g.pct || 0} max={100} color={C.lavender} height={6} />
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 700, color: C.lavender }}>{g.pct || 0}%</div>
                <button onClick={() => { setGoals(prev => prev.filter((_, j) => j !== i)); showToast("Removed"); }}
                  style={{ marginTop: 4, fontSize: 11, color: "#EF4444", background: "none", border: "none", cursor: "pointer" }}>Remove</button>
              </div>
            </div>
          ))
        }
      </Card>

      {/* Recent sessions */}
      <Card>
        <SectionLabel color={C.coral}>Activity</SectionLabel>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>Recent Sessions</div>
        {!sorted.length
          ? <Empty icon="🏋️" title="No sessions yet" text="Log your first workout in the Tracker tab." />
          : sorted.slice(0, 5).map((w, i) => {
            const dc = w.day === "A" ? { accent: C.mint, light: C.mintLight } : { accent: C.coral, light: C.coralLight };
            return (
              <div key={w.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 0", borderBottom: i < Math.min(sorted.length, 5) - 1 ? `1px solid ${C.border}` : "none" }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: dc.accent, flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>Day {w.day} — {w.day === "A" ? "Lower Body Drive" : "Hip & Pull Focus"}</div>
                  <div style={{ fontSize: 11, color: C.textMuted }}>{fmt(w.date)} · {w.exercises.length} exercises · {w.duration} min</div>
                </div>
                <Chip color={dc.accent} bg={dc.light}>Day {w.day}</Chip>
              </div>
            );
          })
        }
      </Card>

      {/* Weight chart */}
      <Card>
        <SectionLabel color={C.sky}>Body Weight</SectionLabel>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}>Weight Trend</div>
        {measurements.filter(m => m.weight).length < 2
          ? <Empty icon="⚖️" title="Not enough data" text="Log at least 2 measurements in the Tracker to see your weight trend." />
          : <canvas ref={canvasRef} style={{ width: "100%", display: "block", borderRadius: 10 }} />
        }
      </Card>
    </div>
  );
}

// ─── PAGE: PCOS CLINICAL REFERENCE ───────────────────────────────────
function PCOSPage() {
  const [activeSection, setActiveSection] = useState("overview");
  const [expandedCard, setExpandedCard] = useState(null);

  const toggle = (id) => setExpandedCard(prev => prev === id ? null : id);

  const sections = [
    { id: "overview",   label: "Overview",    icon: "🔬" },
    { id: "diagnosis",  label: "Diagnosis",   icon: "📋" },
    { id: "pharm",      label: "Pharmacology",icon: "💊" },
    { id: "nonpharm",   label: "Non-Pharm",   icon: "🥦" },
    { id: "pearls",     label: "Pearls",      icon: "💎" },
    { id: "holistic",   label: "Holistic",    icon: "🌿" },
  ];

  // ── EXPANDABLE CARD ──
  const ExpandCard = ({ id, title, icon, color = C.lavender, badge, children }) => {
    const open = expandedCard === id;
    return (
      <div style={{ background: C.white, borderRadius: 18, marginBottom: 10, overflow: "hidden", boxShadow: "var(--shadow-sm)", border: `1px solid ${C.border}` }}>
        <button onClick={() => toggle(id)} style={{
          width: "100%", padding: "16px 18px", background: "none", border: "none", cursor: "pointer",
          display: "flex", alignItems: "center", gap: 12, textAlign: "left",
        }}>
          <div style={{ width: 38, height: 38, borderRadius: 12, background: color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{icon}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 13.5, color: C.text }}>{title}</div>
            {badge && <div style={{ fontSize: 10, color: color, fontWeight: 600, marginTop: 2 }}>{badge}</div>}
          </div>
          <span style={{ color: C.textMuted, fontSize: 16, transition: "transform 0.25s", transform: open ? "rotate(180deg)" : "rotate(0deg)", flexShrink: 0 }}>⌄</span>
        </button>
        {open && (
          <div className="anim-down" style={{ padding: "0 18px 18px", borderTop: `1px solid ${C.border}` }}>
            <div style={{ paddingTop: 14 }}>{children}</div>
          </div>
        )}
      </div>
    );
  };

  // ── EVIDENCE PILL ──
  const EvidencePill = ({ level, source }) => {
    const colors = { "Strong": C.mint, "Moderate": C.amber, "Conditional": C.coral, "Expert": C.sky, "Emerging": C.lavender };
    return (
      <div style={{ display: "inline-flex", alignItems: "center", gap: 6, background: (colors[level] || C.lavender) + "15", borderRadius: 20, padding: "3px 10px", marginBottom: 8 }}>
        <span style={{ fontSize: 9, fontWeight: 800, color: colors[level] || C.lavender, textTransform: "uppercase", letterSpacing: 1.5 }}>{level} Evidence</span>
        {source && <span style={{ fontSize: 9, color: C.textMuted }}>· {source}</span>}
      </div>
    );
  };

  // ── DRUG CARD ──
  const DrugCard = ({ name, class: cls, dose, indication, monitoring, pearls, color = C.lavender, evidence, caution }) => (
    <div style={{ background: C.bg, borderRadius: 14, padding: 16, marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div>
          <div style={{ fontWeight: 800, fontSize: 14, color: C.text }}>{name}</div>
          <div style={{ fontSize: 11, color: color, fontWeight: 600 }}>{cls}</div>
        </div>
        {evidence && <EvidencePill level={evidence.level} source={evidence.source} />}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
        <div style={{ background: C.white, borderRadius: 10, padding: "10px 12px" }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 4 }}>Dosing</div>
          <div style={{ fontSize: 12, color: C.text, lineHeight: 1.5 }}>{dose}</div>
        </div>
        <div style={{ background: C.white, borderRadius: 10, padding: "10px 12px" }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 4 }}>Indication</div>
          <div style={{ fontSize: 12, color: C.text, lineHeight: 1.5 }}>{indication}</div>
        </div>
      </div>
      {monitoring && (
        <div style={{ background: C.amberLight, borderRadius: 10, padding: "8px 12px", marginBottom: 8 }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: C.amberDark, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 3 }}>🔍 Monitor</div>
          <div style={{ fontSize: 12, color: C.textSub }}>{monitoring}</div>
        </div>

      {caution && (
        <div style={{ background: C.peachLight, borderRadius: 10, padding: "8px 12px", marginBottom: 8 }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: C.peach, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 3 }}>⚠️ Caution</div>
          <div style={{ fontSize: 12, color: C.textSub }}>{caution}</div>
        </div>
      )}
      {pearls && (
        <div style={{ background: C.lavLight, borderRadius: 10, padding: "8px 12px" }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: C.lavender, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 3 }}>💎 Pharmacist Pearl</div>
          <div style={{ fontSize: 12, color: C.textSub }}>{pearls}</div>
        </div>
      )}
    </div>
  );

  // ── STAT BOX ──
  const StatBox = ({ value, label, color = C.lavender, sub }) => (
    <div style={{ background: C.white, borderRadius: 14, padding: "14px 12px", textAlign: "center", boxShadow: "var(--shadow-sm)", borderTop: `3px solid ${color}` }}>
      <div style={{ fontFamily: "var(--font-display)", fontSize: 26, fontWeight: 700, color, lineHeight: 1, marginBottom: 4 }}>{value}</div>
      <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.2 }}>{label}</div>
      {sub && <div style={{ fontSize: 10, color: C.textMuted, marginTop: 3 }}>{sub}</div>}
    </div>
  );

  // ── INFO ROW ──
  const InfoRow = ({ label, value, color = C.text }) => (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: `1px solid ${C.border}`, alignItems: "flex-start", gap: 12 }}>
      <span style={{ fontSize: 12, color: C.textMuted, flexShrink: 0, maxWidth: "40%" }}>{label}</span>
      <span style={{ fontSize: 12, color, fontWeight: 600, textAlign: "right" }}>{value}</span>
    </div>
  );

  return (
    <div>
      {/* Source banner */}
      <div style={{ background: "linear-gradient(135deg, #1e1b4b, #312e81)", borderRadius: 18, padding: "14px 18px", marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ fontSize: 28 }}>📚</div>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, color: C.lavender, letterSpacing: 2, textTransform: "uppercase" }}>Evidence Base</div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.85)", lineHeight: 1.5 }}>
            2023 International PCOS Guideline (GRADE) · NEJM · J Clin Endocrinol Metab · CMAJ · Endocrine Society
          </div>
        </div>
      </div>

      {/* Section tabs — scrollable */}
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 18, scrollbarWidth: "none" }}>

          <button key={s.id} onClick={() => setActiveSection(s.id)} style={{

            <StatBox value="70%" label="Undiagnosed" color={C.peach} sub="Avg 2-yr delay to Dx" />
            <StatBox value="70–80%" label="Insulin Resistant" color={C.amber} sub="Even lean phenotypes" />
            <StatBox value="196" label="Countries" color={C.mint} sub="Use 2023 guideline" />
          </div>

          <Card style={{ background: "linear-gradient(135deg, #1e1b4b 0%, #4c1d95 100%)", border: "none" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: C.lavender, letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Definition</div>
            <div style={{ fontSize: 13.5, color: "rgba(255,255,255,0.9)", lineHeight: 1.7 }}>
              PCOS is the most common endocrine disorder in reproductive-age women. It is a <strong style={{ color: C.lavender }}>heterogeneous, multisystem condition</strong> driven by hyperandrogenism and insulin resistance, with reproductive, metabolic, psychological, and cardiovascular sequelae spanning the entire lifespan.
            </div>
          </Card>

          <ExpandCard id="pathophysiology" title="Pathophysiology" icon="⚙️" color={C.lavender} badge="Key mechanism for pharmacist counseling">
            <div style={{ fontSize: 13, color: C.textSub, lineHeight: 1.7, marginBottom: 12 }}>
              PCOS pathophysiology involves a <strong>self-reinforcing cycle</strong> of three interconnected axes:
            </div>
            {[
              { title: "HPO Axis Dysregulation", icon: "🧠", color: C.lavender, body: "Abnormally increased LH pulse frequency from GnRH neurons → elevated LH:FSH ratio → excess ovarian androgen production. FSH-driven follicular maturation is impaired, leading to arrest of antral follicles (\"polycystic\" morphology) and anovulation." },
              { title: "Insulin Resistance & Compensatory Hyperinsulinemia", icon: "🩸", color: C.amber, body: "Affects 70–80% of women with PCOS regardless of BMI. Hyperinsulinemia directly stimulates ovarian theca cells via IGF-1 receptors → more androgens. Simultaneously suppresses hepatic SHBG → ↑ free testosterone. This is the primary pharmacological target for metformin and GLP-1 RAs." },
              { title: "Adrenal Hyperandrogenism", icon: "🫁", color: C.coral, body: "Up to 50% of PCOS cases have elevated DHEAS from adrenal origin. Exacerbated by chronic stress and HPA axis dysregulation — relevant to sleep and cortisol counseling." },
              { title: "Adipose Dysfunction", icon: "🔄", color: C.sky, body: "Visceral adiposity amplifies IR through pro-inflammatory adipokines (↑TNF-α, IL-6, ↓adiponectin). Weight loss of 5–10% can meaningfully reduce androgen levels and restore ovulatory function by breaking this cycle." },
            ].map((p, i) => (
              <div key={i} style={{ display: "flex", gap: 12, background: C.bg, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
                <span style={{ fontSize: 22 }}>{p.icon}</span>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: p.color, marginBottom: 4 }}>{p.title}</div>
                  <div style={{ fontSize: 12, color: C.textSub, lineHeight: 1.6 }}>{p.body}</div>
                </div>
              </div>
            ))}
          </ExpandCard>

          <ExpandCard id="phenotypes" title="Clinical Phenotypes" icon="🧬" color={C.sky} badge="Rotterdam 2023 Criteria — 4 Phenotypes">

function App() {
  const [page, setPage] = useState("program");
  const [toastMsg, setToastMsg] = useState("");
  const toastTimer = useRef(null);

  const showToast = msg => {
    setToastMsg(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(""), 2500);
  };

  const tabs = [
    { id: "program",   label: "Program",   icon: "📋" },
    { id: "tracker",   label: "Tracker",   icon: "🏋️" },
    { id: "nutrition", label: "Nutrition", icon: "🥗" },
    { id: "dashboard", label: "Dashboard", icon: "📊" },
    { id: "pcos",      label: "PCOS",      icon: "🩺" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "var(--font-body)" }}>
      <GlobalStyles />
      <Sidebar page={page} setPage={setPage} tabs={tabs} />
      <TabBar page={page} setPage={setPage} tabs={tabs} />

      {/* Main content */}
      <div className="page-content" style={{ maxWidth: 680, margin: "0 auto", padding: "24px 16px 80px" }}>
        {page === "program" && <ProgramPage />}
        {page !== "program" && (
          <>
            <PageHeader page={page} />
            {page === "tracker"   && <TrackerPage showToast={showToast} />}
            {page === "nutrition" && <NutritionPage showToast={showToast} />}
            {page === "dashboard" && <DashboardPage showToast={showToast} />}
            {page === "pcos"      && <PCOSPage />}
          </>
        )}
      </div>

      <Toast msg={toastMsg} />
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    // Hide loading screen once React has rendered
    setTimeout(() => {
      const el = document.getElementById('loading');
      if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
    }, 100);
  </script>

  <script>
    // iOS PWA install hint - iOS Safari doesn't show install prompt automatically
    window.addEventListener('load', () => {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isInStandalone = window.navigator.standalone === true;
      const dismissed = localStorage.getItem('pwa-hint-dismissed');
      
      if (isIOS && !isInStandalone && !dismissed) {
        const banner = document.createElement('div');
        banner.id = 'ios-hint';
        banner.innerHTML = `
          <div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            background:#1C1C1E;color:#fff;padding:12px 18px;border-radius:14px;
            font-family:-apple-system,sans-serif;font-size:13px;z-index:99999;
            box-shadow:0 4px 20px rgba(0,0,0,0.4);display:flex;align-items:center;gap:10px;
            max-width:300px;text-align:center;line-height:1.4;">
            <span style="font-size:22px">📲</span>
            <span>Tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong> to install this app</span>
            <button onclick="document.getElementById('ios-hint').remove();localStorage.setItem('pwa-hint-dismissed','1')" 
              style="background:none;border:none;color:#9CA3AF;font-size:20px;cursor:pointer;padding:0;line-height:1">×</button>
          </div>`;
        setTimeout(() => document.body.appendChild(banner), 2500);
      }
    });

    // Android/Chrome: listen for install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show install button if you want — for now auto-trigger after 3s
      setTimeout(() => {
        if (deferredPrompt) deferredPrompt.prompt();
      }, 3000);
    });
  </script>
